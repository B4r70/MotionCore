<!-- @dsCard group="Foundations" -->
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1C1C1E;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    padding: 24px;
    width: 360px;
    color: #fff;
  }
  h2 { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; margin-bottom: 16px; color: rgba(255,255,255,0.55); }
  .row { display: flex; align-items: baseline; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
  .row:last-child { border-bottom: none; }
  .meta { font-size: 10px; color: rgba(255,255,255,0.35); font-family: 'SF Mono', Menlo, monospace; }
  .hero-num { font-size: 48px; font-weight: 700; font-variant-numeric: tabular-nums; color: #5CC63F; line-height: 1; }
  .title    { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .subhead  { font-size: 15px; font-weight: 600; }
  .caption  { font-size: 12px; color: rgba(255,255,255,0.55); }
  .cap2     { font-size: 10px; color: rgba(255,255,255,0.45); }
</style>
</head>
<body>
  <h2>Typografie-Skala</h2>
  <div class="row">
    <span class="hero-num">78</span>
    <span class="meta">Hero · size×0.28 · bold · tabular</span>
  </div>
  <div class="row">
    <span class="title">Tagesform</span>
    <span class="meta">largeTitle · bold</span>
  </div>
  <div class="row">
    <span class="subhead" style="font-variant-numeric:tabular-nums">62 bpm</span>
    <span class="meta">subheadline · semibold · tabular</span>
  </div>
  <div class="row">
    <span style="font-size:13px; font-weight:500">Schlafqualität</span>
    <span class="meta">body · medium</span>
  </div>
  <div class="row">
    <span class="caption">Ruhepuls</span>
    <span class="meta">caption · secondary</span>
  </div>
  <div class="row">
    <span class="cap2">BEREITSCHAFT</span>
    <span class="meta">caption2 · tertiary</span>
  </div>
</body>
</html>
